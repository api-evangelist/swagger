aid: swagger
name: Swagger
description: >-
  Swagger is an open-source framework by SmartBear for designing, building,
  documenting, and consuming RESTful APIs. The Swagger toolset includes
  Swagger UI for interactive documentation, Swagger Editor for writing
  OpenAPI specifications, and Swagger Codegen for generating client SDKs
  and server stubs.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Documentation
  - API Design
  - OpenAPI
  - REST
url: >-
  https://raw.githubusercontent.com/api-evangelist/swagger/refs/heads/main/apis.yml
created: '2025-01-01'
modified: '2026-03-25'
specificationVersion: '0.19'
apis:
  - aid: swagger:swagger-ui
    name: Swagger UI
    description: >-
      Swagger UI renders OpenAPI specifications as interactive API
      documentation, allowing developers to explore and test API endpoints
      directly in the browser.
    humanURL: https://swagger.io/tools/swagger-ui/
    tags:
      - Documentation
      - OpenAPI
      - Interactive Docs
    properties:
      - type: Documentation
        url: https://swagger.io/docs/open-source-tools/swagger-ui/usage/installation/
      - type: Getting Started
        url: https://swagger.io/docs/open-source-tools/swagger-ui/usage/installation/
      - type: GitHub Repository
        url: https://github.com/swagger-api/swagger-ui
  - aid: swagger:swagger-editor
    name: Swagger Editor
    description: >-
      Swagger Editor is a browser-based editor for writing and validating
      OpenAPI and AsyncAPI specifications with real-time preview.
    humanURL: https://swagger.io/tools/swagger-editor/
    tags:
      - API Design
      - OpenAPI
      - Editor
    properties:
      - type: Documentation
        url: https://swagger.io/docs/open-source-tools/swagger-editor/
      - type: GitHub Repository
        url: https://github.com/swagger-api/swagger-editor
  - aid: swagger:swagger-codegen
    name: Swagger Codegen
    description: >-
      Swagger Codegen generates server stubs, client SDKs, and API
      documentation from OpenAPI specifications in over 40 languages.
    humanURL: https://swagger.io/tools/swagger-codegen/
    tags:
      - Code Generation
      - SDK
      - OpenAPI
    properties:
      - type: Documentation
        url: https://swagger.io/docs/open-source-tools/swagger-codegen/
      - type: GitHub Repository
        url: https://github.com/swagger-api/swagger-codegen
